<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace | Craft-Hub</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <!-- NAVIGATION -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <span class="logo-icon">🌿</span>
        Craft-Hub
      </a>
      
      <div class="search-bar">
        <input type="text" placeholder="Search for handmade goods...">
        <button class="search-btn">🔍</button>
      </div>

      <div class="nav-links">
        <a href="/pages/products.html" class="nav-link" style="font-weight: 600; color: var(--color-primary);">Marketplace</a>
        <a href="/pages/seller.html" class="nav-link">Artisans</a>
        <div class="auth-buttons" id="auth-container">
          <!-- Auth logic injects here -->
          <button class="btn btn-outline" id="btn-login" style="padding: 0.5rem 1.2rem; font-size: 0.9rem;">Log In</button>
          <button class="btn btn-primary" id="btn-signup" style="padding: 0.5rem 1.2rem; font-size: 0.9rem;">Join</button>
        </div>
        <a href="/pages/cart.html" class="cart-icon">
          🛒 <span class="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- MAIN LISTING LAYOUT -->
  <main class="marketplace-container section-padding" style="padding-top: 8rem;">
    <aside class="filter-sidebar">
      <h3>Filters</h3>
      <div class="filter-group">
        <h4 style="margin-bottom:0.75rem; color:var(--color-text);">Categories</h4>
        <label><input type="checkbox" class="category-filter" value="pottery"> Ceramics & Pottery</label>
        <label><input type="checkbox" class="category-filter" value="woodwork"> Woodworking</label>
        <label><input type="checkbox" class="category-filter" value="textiles"> Textiles & Woven</label>
        <label><input type="checkbox" class="category-filter" value="jewelry"> Handmade Jewelry</label>
      </div>
      <div class="filter-group">
        <h4 style="margin-bottom:0.75rem; color:var(--color-text);">Price Range</h4>
        <label><input type="radio" name="price" value="under50"> Under $50</label>
        <label><input type="radio" name="price" value="50to100"> $50 to $100</label>
        <label><input type="radio" name="price" value="over100"> Over $100</label>
      </div>
    </aside>

    <section class="products-display">
      <div class="products-header">
        <h1 style="font-size: 2.25rem;">Marketplace <em>Discoveries</em></h1>
        <div style="display:flex; align-items:center; gap:0.5rem; color:var(--color-secondary);">
          <span>Sort by:</span>
          <select style="padding:0.4rem; border-radius:var(--radius-sm); border:1px solid rgba(107,112,92,0.2);">
            <option>Featured</option>
            <option>Newest</option>
            <option>Price: Low to High</option>
          </select>
        </div>
      </div>
      <div class="product-grid" id="main-product-grid">
        <!-- JS iterates items here -->
      </div>
    </section>
  </main>
  
  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-bottom">
      <p>&copy; 2026 Craft-Hub. All rights reserved.</p>
    </div>
  </footer>

  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="/js/products.js"></script>
</body>
</html>
