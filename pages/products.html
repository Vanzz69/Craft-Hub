<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace | Craft-Hub</title>
  <meta name="description" content="Browse handmade ceramics, woodwork, textiles, jewelry and more from independent artisans on Craft-Hub.">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="../" class="logo">
        <img src="../logo.svg" alt="Craft-Hub Logo">
      </a>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search handmade goods..." id="search-input">
      </div>
      <button class="mobile-toggle" id="mobile-toggle" aria-label="Menu">☰</button>
      <div class="nav-links" id="nav-links">
        <a href="./products.html" class="nav-link active">Marketplace</a>
        <a href="./seller.html" class="nav-link">Artisans</a>
        <div class="auth-buttons" id="auth-container">
          <button class="btn btn-outline" id="btn-login" style="padding:.5rem 1.2rem;font-size:.9rem">Log In</button>
          <button class="btn btn-primary" id="btn-signup" style="padding:.5rem 1.2rem;font-size:.9rem">Join</button>
        </div>
        <a href="./cart.html" class="cart-link">
          🛒 <span class="cart-badge" id="cart-badge-global">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- MARKETPLACE LAYOUT -->
  <main class="marketplace-container section-padding" style="padding-top:7rem;">
    <aside class="filter-sidebar" id="filter-sidebar">
      <h3>Filters</h3>

      <div class="filter-group">
        <h4>Categories</h4>
        <label><input type="checkbox" class="category-filter" value="pottery"> Ceramics &amp; Pottery</label>
        <label><input type="checkbox" class="category-filter" value="woodwork"> Woodworking</label>
        <label><input type="checkbox" class="category-filter" value="textiles"> Textiles &amp; Woven</label>
        <label><input type="checkbox" class="category-filter" value="jewelry"> Handmade Jewelry</label>
      </div>

      <div class="filter-group">
        <h4>Price Range</h4>
        <label><input type="radio" name="price" class="price-filter" value="all" checked> All Prices</label>
        <label><input type="radio" name="price" class="price-filter" value="under2000"> Under ₹2,000</label>
        <label><input type="radio" name="price" class="price-filter" value="2000to5000"> ₹2,000 – ₹5,000</label>
        <label><input type="radio" name="price" class="price-filter" value="5000to10000"> ₹5,000 – ₹10,000</label>
        <label><input type="radio" name="price" class="price-filter" value="over10000"> Over ₹10,000</label>
      </div>

      <button class="btn btn-outline" style="width:100%;font-size:.85rem;padding:.5rem" id="clear-filters">Clear All Filters</button>
    </aside>

    <section class="products-display">
      <div class="products-header">
        <div>
          <h1>Marketplace <em>Discoveries</em></h1>
          <p class="product-count" id="product-count">Showing 0 products</p>
        </div>
        <select class="sort-select" id="sort-select">
          <option value="featured">Sort: Featured</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
          <option value="name">Name: A – Z</option>
        </select>
      </div>
      <div class="product-grid" id="main-product-grid">
        <!-- JS renders products here -->
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <div class="logo" style="margin-bottom:.25rem">
          <img src="../favicon.svg" alt="Craft-Hub" style="height:28px;filter:brightness(10)"> Craft-Hub
        </div>
        <p>Elevating the art of handmade.</p>
      </div>
      <div class="footer-col"><h4>Shop</h4><a href="./products.html">All Products</a></div>
      <div class="footer-col"><h4>Sell</h4><a href="#">Become a Seller</a></div>
      <div class="footer-col"><h4>Support</h4><a href="#">Help Center</a><a href="#">Contact Us</a></div>
    </div>
    <div class="footer-bottom"><p>&copy; 2026 Craft-Hub. All rights reserved.</p></div>
  </footer>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="../js/auth.js"></script>
  <script type="module" src="../js/products.js"></script>
</body>
</html>
